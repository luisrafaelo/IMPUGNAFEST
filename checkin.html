<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in — Impugna Fest</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:      #09080a;
      --c-surface: rgba(21,15,24,0.9);
      --c-border:  rgba(255,106,0,0.15);
      --c-accent:  #ff6a00;
      --c-green:   #00ff88;
      --c-red:     #ff2d78;
      --c-gold:    #ffd700;
      --c-text:    #f5ede8;
      --c-text-2:  #a08878;
      --font-d:    'Orbitron', sans-serif;
      --font-b:    'Syne', sans-serif;
    }

    body {
      font-family: var(--font-b);
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    .nav {
      width: 100%;
      background: rgba(9,8,10,0.95);
      border-bottom: 1px solid var(--c-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-title {
      font-family: var(--font-d);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--c-accent);
    }

    .nav-tag {
      font-family: var(--font-d);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--c-text-2);
      background: rgba(255,106,0,0.08);
      border: 1px solid var(--c-border);
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* LOGIN */
    #loginScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      width: 100%;
    }

    .login-box {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      backdrop-filter: blur(20px);
    }

    .login-box h2 {
      font-family: var(--font-d);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--c-accent);
      text-align: center;
    }

    .login-box p {
      font-size: 0.8rem;
      color: var(--c-text-2);
      text-align: center;
    }

    .login-box input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--c-text);
      font-family: var(--font-b);
      font-size: 0.95rem;
      outline: none;
      letter-spacing: 0.1em;
      width: 100%;
    }

    .login-box input:focus { border-color: var(--c-accent); }

    .btn {
      background: linear-gradient(135deg, var(--c-accent), #ff3c00);
      border: none;
      color: #fff;
      font-family: var(--font-d);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .login-error {
      font-size: 0.78rem;
      color: var(--c-red);
      text-align: center;
      display: none;
    }

    /* MAIN */
    #mainScreen {
      display: none;
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 24px 16px;
      flex-direction: column;
      gap: 20px;
    }

    /* SCANNER */
    .scanner-box {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }

    .scanner-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .scanner-title {
      font-family: var(--font-d);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--c-text-2);
      text-transform: uppercase;
    }

    .scanner-status {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .scanner-status.active  { background: rgba(0,255,136,0.1); color: var(--c-green); }
    .scanner-status.inactive { background: rgba(255,255,255,0.06); color: var(--c-text-2); }

    #qr-reader {
      width: 100%;
      min-height: 280px;
    }

    #qr-reader video { border-radius: 0 !important; }
    #qr-reader img   { display: none !important; }

    .scanner-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      border: 2px solid var(--c-accent);
      border-radius: 12px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(9,8,10,0.5);
    }

    .scanner-overlay::before,
    .scanner-overlay::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--c-accent);
      border-style: solid;
    }

    .scanner-overlay::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scanner-overlay::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .btn-scan {
      margin: 16px;
      width: calc(100% - 32px);
    }

    /* RESULTADO */
    .result-box {
      border-radius: 20px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.4s ease both;
    }

    .result-box.success {
      background: rgba(0,255,136,0.06);
      border: 1px solid rgba(0,255,136,0.3);
    }

    .result-box.error {
      background: rgba(255,45,120,0.06);
      border: 1px solid rgba(255,45,120,0.3);
    }

    .result-box.warning {
      background: rgba(255,165,0,0.06);
      border: 1px solid rgba(255,165,0,0.3);
    }

    .result-icon {
      font-size: 3rem;
      text-align: center;
    }

    .result-title {
      font-family: var(--font-d);
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .result-box.success .result-title { color: var(--c-green); }
    .result-box.error   .result-title { color: var(--c-red); }
    .result-box.warning .result-title { color: #ffa500; }

    .result-detail {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 16px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .result-row span:first-child { color: var(--c-text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .result-row span:last-child  { font-weight: 600; color: var(--c-text); }

    /* CONTADOR */
    .counter-box {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .counter-label { font-size: 0.75rem; color: var(--c-text-2); text-transform: uppercase; letter-spacing: 0.1em; }

    .counter-value {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 900;
      color: var(--c-accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-title">IMPUGNA FEST</span>
    <span class="nav-tag">CHECK-IN</span>
  </nav>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>Acceso Staff</h2>
      <p>Solo personal autorizado de puerta</p>
      <input type="password" id="pinInput" placeholder="Contraseña" maxlength="20" />
      <button class="btn" onclick="checkLogin()">Entrar</button>
      <span class="login-error" id="loginError">Contraseña incorrecta</span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainScreen">

    <div class="counter-box">
      <div>
        <div class="counter-label">Ingresos registrados</div>
      </div>
      <span class="counter-value" id="ingresoCount">0</span>
    </div>

    <div class="scanner-box">
      <div class="scanner-header">
        <span class="scanner-title">Escáner QR</span>
        <span class="scanner-status inactive" id="scannerStatus">Inactivo</span>
      </div>
      <div id="qr-reader"></div>
      <button class="btn btn-scan" id="btnScan" onclick="toggleScanner()">▶ Iniciar Escáner</button>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-detail" id="resultDetail"></div>
      <button class="btn" onclick="resetResult()">Siguiente entrada</button>
    </div>

  </div>

  <script src="checkin.js"></script>
</body>
</html>
